{% if site.utterances_repo == "YOUR_GITHUB_USERNAME/YOUR_REPO" %}
<p><em>Comments are enabled but Utterances repo isn't configured. Set `utterances_repo` in `_config.yml`.</em></p>
{% else %}
  <div id="comments">
    <script src="https://utteranc.es/client.js"
            repo="{{ site.utterances_repo }}"
            issue-term="pathname"
            theme="github-light"
            crossorigin="anonymous"
            async>
    </script>
  </div>
{% endif %}
